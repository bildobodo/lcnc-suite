[EMC]
VERSION = 1.1
MACHINE = lcnc-suite Sim
DEBUG = 0

[DISPLAY]
DISPLAY = lcnc-suite
OPEN_FILE = ~/linuxcnc/nc_files/blank.ngc
CONFIRM_EXIT = False
WEBUI_HOST = 0.0.0.0          # 0.0.0.0 = LAN accessible (also serves localhost); 127.0.0.1 = local only
WEBUI_PORT = 8000             # HTTP + WebSocket port (browser connects to http://<host>:<port>)
WEBUI_BROWSER = 1             # 0|1 — auto-open default browser on startup
WEBUI_DEV = 0                 # 0|1 — 1 starts Vite dev server on :5173 (hot-reload, dev only); 0 serves built dist/

# ── Gateway performance flags (see README § Performance flags) ──
WEBUI_STATUS_DELTA  = 1       # 0|1 — send only changed status fields (recommended ON, ~90% bandwidth cut)
WEBUI_ADAPTIVE_POLL = 1       # 0|1 — drop poll rate to WEBUI_IDLE_POLL_HZ when machine is idle (recommended ON for SBCs)
WEBUI_IDLE_POLL_HZ  = 5       # idle-state Hz (only read when ADAPTIVE_POLL=1)
WEBUI_UVLOOP        = 0       # 0|1 — swap asyncio → uvloop event loop (situational, real load only)
WEBUI_WIRE_FORMAT   = msgpack # json|msgpack — WS encoding (msgpack recommended; smaller frames, faster encode; json only for DevTools debugging)

DEBUG = 0
MAX_FEED_OVERRIDE = 2.0
MAX_SPINDLE_OVERRIDE = 2.0
MIN_SPINDLE_OVERRIDE = 0.5
DEFAULT_SPINDLE_SPEED = 300
DEFAULT_LINEAR_VELOCITY = 25
MAX_LINEAR_VELOCITY = 80
MIN_LINEAR_VELOCITY = 0.1
DEFAULT_ANGULAR_VELOCITY = 5
MAX_ANGULAR_VELOCITY = 10
MIN_ANGULAR_VELOCITY = 1
PROGRAM_PREFIX = ~/linuxcnc/nc_files
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
GEOMETRY = XYZ

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files

[RS274NGC]
RS274NGC_STARTUP_CODE = F100 S50 G21 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = sim.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
# Adjust paths below to where you cloned lcnc-suite
SUBROUTINE_PATH = ~/lcnc-suite/subroutines/probe_basic:~/lcnc-suite/subroutines/tool_length_probe:~/lcnc-suite/subroutines/surfacemap
ON_ABORT_COMMAND = O<on_abort> call
REMAP=M600 modalgroup=6 ngc=m600
REMAP=M601 modalgroup=6 ngc=m601
USER_M_PATH = ./
FEATURES = 12

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALFILE = hallib/core_sim_3.hal
HALFILE = hallib/spindle_sim.hal
HALFILE = hallib/simulated_home_probe_basic.hal
HALFILE = hallib/sim_cannon.hal
HALFILE = hallib/lcnc_webui.hal
HALUI = halui
TWOPASS = on

[HALUI]
HALUI = halui

[TRAJ]
AXES = 3
SPINDLES = 1
COORDINATES = X Y Z
HOME = 0 0 0 0 0
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 50
MAX_LINEAR_VELOCITY = 100

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[KINS]
KINEMATICS = trivkins coordinates=XYZ
JOINTS = 3

#==================
#      X Axis
#==================

[AXIS_X]
MIN_LIMIT = -0.1
MAX_LIMIT = 685
MAX_VELOCITY = 100
MAX_ACCELERATION = 750

[JOINT_0]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 100
MAX_ACCELERATION = 750
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -0.1
MAX_LIMIT = 685
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 100
HOME_LATCH_VEL = 5
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1
HOME_IS_SHARED = 1

#==================
#      Y Axis
#==================

[AXIS_Y]
MIN_LIMIT = -0.1
MAX_LIMIT = 705
MAX_VELOCITY = 100
MAX_ACCELERATION = 750

[JOINT_1]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 100
MAX_ACCELERATION = 750
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -0.1
MAX_LIMIT = 705
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 100
HOME_LATCH_VEL = 5
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 1
HOME_IS_SHARED = 1

#==================
#      Z Axis
#==================

[AXIS_Z]
MIN_LIMIT = -190
MAX_LIMIT = 0.10
MAX_VELOCITY = 80
MAX_ACCELERATION = 750
OFFSET_AV_RATIO = 0.2       # smoothing for surface compensation Z offsets (LinuxCNC built-in)

[JOINT_2]
TYPE = LINEAR
HOME = 0.000
MAX_VELOCITY = 80
MAX_ACCELERATION = 750
BACKLASH = 0.003
INPUT_SCALE = 4000
OUTPUT_SCALE = 1.000
MIN_LIMIT = -190
MAX_LIMIT = 0.1
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 1.0
HOME_SEARCH_VEL = 100
HOME_LATCH_VEL = 5
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = NO
HOME_SEQUENCE = 0
HOME_IS_SHARED = 1

#==================
#     Spindle
#==================

[SPINDLE_0]
MAX_FORWARD_VELOCITY = 3000
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 2000
